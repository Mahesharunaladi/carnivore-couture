<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carnivore Couture</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    /* RESET & BASE */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
    .cart {
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background-color: #e63946;
      position: relative;
    }
    .cart-count {
      position: absolute;
      top: -0.5rem;
      right: -0.5rem;
      background-color: #0f0f0f;
      color: white;
      border-radius: 50%;
      padding: 0.2em 0.5em;
      font-size: 0.8em;
      min-width: 1.5em;
      text-align: center;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1606890658317-7d14490b76fd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 5%;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    .hero p {
      font-size: 1.3rem;
      margin-bottom: 2rem;
      max-width: 700px;
    }
    .btn {
      background: #e63946;
      color: white;
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { background: #d00000; transform: scale(1.05); }

    /* SECTION TITLE */
    .section-title {
      text-align: center;
      padding: 4rem 5% 2rem;
    }
    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .section-title p {
      color: #aaa;
      font-size: 1.1rem;
    }

    /* PRODUCTS GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      padding: 0 5% 4rem;
    }
    .product-card {
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s;
      position: relative;
    }
    .product-card:hover { transform: translateY(-10px); }
    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .product-info {
      padding: 1.5rem;
    }
    .product-info h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }
    .price {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .price .current {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e63946;
    }
    .price .old {
      font-size: 1.1rem;
      color: #666;
      text-decoration: line-through;
    }
    .add-to-cart {
      background: #e63946;
      color: white;
      border: none;
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.3s;
    }
    .add-to-cart:hover { background: #d00000; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero h1 { font-size: 3rem; }
      .hero p { font-size: 1.1rem; }
      .section-title h2 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Carnivore Couture</div>
    <div class="cart" id="cart-icon">
      🛒 <span id="cart-item-count">0</span>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>CarnivoreCouture</h1>
    <p>Premium meat delivery service with exciting offers just for you!</p>
    <button class="btn">Shop Now</button>
  </section>

  <!-- SECTION: FEATURED -->
  <div class="section-title">
    <h2>FEATURED PRODUCTS</h2>
    <p>Our most popular premium selections</p>
  </div>

  <!-- PRODUCTS -->
  <div class="products">
    <!-- Product 1 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1606890658317-7d14490b76fd?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Chicken Breast">
      <div class="badge">PREMIUM</div>
      <div class="product-info">
        <h3>PREMIUM CHICKEN BREAST</h3>
        <div class="price">
          <span class="current">₹3,750</span>
          <span class="old">₹5,200</span>
        </div>
        <button class="add-to-cart ai-style-change-1">Add to Cart</button>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1625937288805-2d59eaccd7a4?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Chicken Wings">
      <div class="badge">BESTSELLER</div>
      <div class="product-info">
        <h3>CHICKEN WINGS</h3>
        <div class="price">
          <span class="current">₹2,800</span>
          <span class="old">₹3,500</span>
        </div>
        <button class="add-to-cart ai-style-change-1">Add to Cart</button>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1625937329935-95b5e0a0e803?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Chicken Thighs">
      <div class="product-info">
        <h3>CHICKEN THIGHS</h3>
        <div class="price">
          <span class="current">₹3,200</span>
        </div>
        <button class="add-to-cart ai-style-change-1">Add to Cart</button>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1626645735805-50e12c8af7d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Whole Chicken">
      <div class="product-info">
        <h3>WHOLE CHICKEN</h3>
        <div class="price">
          <span class="current">₹4,500</span>
        </div>
        <button class="add-to-cart ai-style-change-1">Add to Cart</button>
      </div>
    </div>
  </div>

  <script>
    function updateCartItemCount(count) {
      const cartCountElement = document.getElementById('cart-item-count');
      if (cartCountElement) {
        cartCountElement.textContent = count;
      }
    }

    const cartElement = document.getElementById('cart-icon');
    if (cartElement) {
      cartElement.addEventListener('click', () => {
        console.log('Cart clicked! Displaying cart contents...');
        alert('Cart clicked! (This is a placeholder for actual cart display)');
        // In a real application, you would open a cart drawer or navigate to a cart page here.
      });
    }

    const addToCartButtons = document.querySelectorAll('.add-to-cart');
    addToCartButtons.forEach(button => {
      button.addEventListener('click', (event) => {
        const productCard = event.target.closest('.product-card');
        const productName = productCard.querySelector('h3').textContent;
        console.log(`Added "${productName}" to cart!`);
        alert(`Added "${productName}" to cart!`);
        // Here you would typically add logic to update the cart state
        // For now, let's just increment a placeholder cart count
        let currentCartCount = parseInt(document.getElementById('cart-item-count').textContent);
        updateCartItemCount(currentCartCount + 1);
      });
    });

    // Example of how to update the cart count (you would integrate this with your actual cart logic)
    // updateCartItemCount(3);
  </script>

</body>
</html>
